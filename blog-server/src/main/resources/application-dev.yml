spring:
  datasource:
    url: ${BLOG_DB_URL:jdbc:mysql://localhost:3307/blogweb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${BLOG_DB_USERNAME:}
    password: ${BLOG_DB_PASSWORD:}
    driver-class-name: ${BLOG_DB_DRIVER:com.mysql.cj.jdbc.Driver}


blog:
  jwt:
    user-secret-key: ${BLOG_JWT_USER_SECRET_KEY:}
  alioss:
    endpoint: ${BLOG_OSS_ENDPOINT:}
    access-key-id: ${BLOG_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${BLOG_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${BLOG_OSS_BUCKET_NAME:}
