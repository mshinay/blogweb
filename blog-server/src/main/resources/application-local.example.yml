spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blogweb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: your-db-username
    password: your-db-password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      # password: 123456
      database: 1
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

blog:
  jwt:
    user-secret-key: replace-with-at-least-32-char-secret
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: oss-cn-your-region.aliyuncs.com
    access-key-id: your-oss-access-key-id
    access-key-secret: your-oss-access-key-secret
    bucket-name: your-oss-bucket-name
